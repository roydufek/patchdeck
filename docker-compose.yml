services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: patchdeck-api
    restart: unless-stopped
    environment:
      PATCHDECK_PORT: 6070
      PATCHDECK_DB_PATH: /data/patchdeck.db
      PATCHDECK_MASTER_KEY: ${PATCHDECK_MASTER_KEY}
      PATCHDECK_JWT_SECRET: ${PATCHDECK_JWT_SECRET}
      PATCHDECK_APPRISE_URL: ${PATCHDECK_APPRISE_URL:-}
      PATCHDECK_APPRISE_TIMEOUT_SECONDS: ${PATCHDECK_APPRISE_TIMEOUT_SECONDS:-10}
      PATCHDECK_APPRISE_BIN: ${PATCHDECK_APPRISE_BIN:-apprise}
      PATCHDECK_SSH_TIMEOUT_SECONDS: ${PATCHDECK_SSH_TIMEOUT_SECONDS:-20}
      # REGISTRATION_ENABLED: Set to "false" to block new user registration (bootstrap).
      # Default: "true" — allows the first-run admin account creation.
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
    volumes:
      - ./data:/data
    networks:
      - docknet

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: patchdeck-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "6070:80"
    networks:
      - docknet

networks:
  docknet:
    external: true
